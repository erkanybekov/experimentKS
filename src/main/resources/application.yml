spring:
  application:
    name: experimentKS
  profiles:
    default: local
  datasource:
    url: jdbc:h2:mem:experimentks;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  data:
    redis:
      host: ${EXPERIMENTKS_REDIS_HOST:localhost}
      port: ${EXPERIMENTKS_REDIS_PORT:6379}
      timeout: 2s
      repositories:
        enabled: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  name: ${spring.application.name}
  description: Backend API for the ExperimentKmp mobile app.
  version: ${APP_VERSION:0.0.1-SNAPSHOT}
  environment: local
  api-base-path: /api/v1
