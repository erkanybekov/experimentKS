server:
  port: ${PORT:8080}

spring:
  application:
    name: experimentKS
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/experimentks}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
  jackson:
    time-zone: UTC
    deserialization:
      fail-on-unknown-properties: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  name: ${spring.application.name}
  api-base-path: /api/v1
  base-url: ${APP_BASE_URL:}
  auth:
    issuer: experimentKS
    secret: ${JWT_SECRET:change-me-to-a-long-random-secret-at-least-32-characters}
    access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:PT15M}
    refresh-token-ttl: ${JWT_REFRESH_TOKEN_TTL:P30D}

logging:
  level:
    root: INFO
    com.erkan.experimentks: ${LOGGING_LEVEL_COM_ERKAN_EXPERIMENTKS:INFO}
